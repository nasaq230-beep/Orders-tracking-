<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">تتبع الطلبات | نسق التحدي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --purple: #4D256B;
    --purple-light: #6C3C92;
    --orange: #ED4923;
    --orange-light: #FCE0D8;
    --cream: #FAF7F5;
    --green: #2FAE6B;
    --green-light: #DCF5E7;
    --slate: #6B6470;
    --line: #E8E1E6;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', 'Poppins', sans-serif;
    background: var(--cream);
    color: var(--purple);
    min-height: 100vh;
    padding: 0 0 60px;
  }
  html[dir="ltr"] body { font-family: 'Poppins', 'Tajawal', sans-serif; }

  .hero {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
    color: var(--white);
    padding: 28px 20px 60px;
    border-radius: 0 0 32px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 15% 25%, rgba(237,73,35,0.20) 0, transparent 35%),
                       radial-gradient(circle at 85% 75%, rgba(237,73,35,0.14) 0, transparent 40%);
  }
  .lang-switch {
    position: absolute;
    top: 16px;
    inset-inline-end: 16px;
    z-index: 3;
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 30px;
    padding: 4px;
  }
  .lang-switch button {
    border: none;
    background: transparent;
    color: #E7DDEF;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-switch button.active {
    background: var(--orange);
    color: var(--white);
  }
  .logo-wrap {
    position: relative; z-index: 1;
    margin-bottom: 10px;
  }
  .logo-wrap img {
    max-width: 200px;
    max-height: 90px;
    width: auto;
    margin: 0 auto;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
  }
  .hero h1 {
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 24px;
    position: relative; z-index: 1;
    margin-top: 6px;
  }
  .hero p {
    margin-top: 6px;
    font-size: 14px;
    color: #E7DDEF;
    position: relative; z-index: 1;
  }

  .container {
    max-width: 720px;
    margin: -34px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 2;
  }

  .greeting-card {
    background: var(--white);
    border-radius: 18px;
    padding: 18px 20px;
    display: none;
    align-items: center;
    gap: 14px;
    box-shadow: 0 10px 30px rgba(77,37,107,0.08);
    margin-bottom: 18px;
  }
  .greeting-card.show { display: flex; }
  .greeting-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--orange-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .greeting-avatar svg { color: var(--orange); width: 22px; height: 22px; }
  .greeting-card h2 {
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--purple);
  }
  .greeting-card span {
    font-size: 12px;
    color: var(--slate);
  }

  .section-label {
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--purple);
    display: flex; align-items: center; gap: 8px;
    margin: 22px 0 12px;
  }
  .section-label svg { width: 18px; height: 18px; color: var(--orange); }

  .order-card {
    background: var(--white);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 6px 20px rgba(77,37,107,0.06);
    border: 1px solid var(--line);
  }
  .order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .order-id-wrap { display: flex; align-items: center; gap: 10px; }
  .order-id-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--orange-light);
    color: var(--orange);
  }
  .order-card.delivered .order-id-icon {
    background: var(--green-light);
    color: var(--green);
  }
  .order-id-icon svg { width: 18px; height: 18px; }
  .order-id {
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--purple);
  }
  .order-sub { font-size: 12px; color: var(--slate); margin-top: 2px; }

  .status {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    background: var(--orange-light);
    white-space: nowrap;
  }
  .status.delivered { color: var(--green); background: var(--green-light); }
  .status svg { width: 14px; height: 14px; }

  .progress-track {
    display: flex;
    align-items: center;
    margin: 14px 0 6px;
    padding: 0 4px;
  }
  .progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .progress-step .dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--white);
    z-index: 2;
    transition: background 0.3s;
  }
  .progress-step .dot svg { width: 13px; height: 13px; }
  .progress-step.active .dot { background: var(--orange); }
  .progress-step.done .dot { background: var(--green); }
  .progress-step .label {
    font-size: 11px;
    color: var(--slate);
    margin-top: 6px;
    text-align: center;
  }
  .progress-step.active .label,
  .progress-step.done .label { color: var(--purple); font-weight: 700; }
  .progress-line {
    position: absolute;
    top: 13px;
    height: 2px;
    background: var(--line);
    z-index: 1;
    inset-inline-start: -50%;
    inset-inline-end: 50%;
  }
  .progress-step:first-child .progress-line { display: none; }
  .progress-step.done .progress-line,
  .progress-step.active .progress-line { background: var(--green); }

  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--slate);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
  }
  .detail-row svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; color: var(--purple-light); }
  .detail-row b { color: var(--purple); font-weight: 700; }

  .state-card {
    background: var(--white);
    border-radius: 18px;
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(77,37,107,0.06);
    border: 1px solid var(--line);
  }
  .state-card .state-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--orange-light);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    color: var(--orange);
  }
  .state-card.error .state-icon { background: #FBE3E1; color: #C0392B; }
  .state-card .state-icon svg { width: 26px; height: 26px; }
  .state-card h3 {
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-size: 16px;
    margin-bottom: 6px;
    color: var(--purple);
  }
  .state-card p { font-size: 13px; color: var(--slate); line-height: 1.7; }
  .spin svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .admin-toggle {
    text-align: center;
    margin-top: 30px;
  }
  .admin-toggle button {
    background: none;
    border: 1px solid var(--line);
    color: var(--slate);
    font-size: 12px;
    font-family: inherit;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .admin-toggle button:hover { border-color: var(--orange); color: var(--purple); }
  .admin-toggle button svg { width: 14px; height: 14px; }

  .admin-section { display: none; margin-top: 18px; }
  .admin-section.show { display: block; }

  .panel {
    background: var(--white);
    border-radius: 18px;
    padding: 22px 20px;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(77,37,107,0.06);
    border: 1px solid var(--line);
  }
  .panel-title {
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 16px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
    color: var(--purple);
  }
  .panel-title .ic {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--purple);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
  }
  .panel-title .ic svg { width: 16px; height: 16px; }

  .field { margin-bottom: 12px; }
  .field label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; color: var(--purple);
    margin-bottom: 5px;
  }
  .field label svg { width: 14px; height: 14px; color: var(--slate); }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--cream);
    color: var(--purple);
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--orange);
    background: var(--white);
  }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .btn-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 20px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .btn svg { width: 16px; height: 16px; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--purple); color: var(--white); box-shadow: 0 6px 16px rgba(77,37,107,0.25); }
  .btn-primary:hover { background: var(--purple-light); }
  .btn-secondary { background: var(--cream); color: var(--purple); border: 1px solid var(--line); }
  .btn-secondary:hover { border-color: var(--orange); }
  .btn-danger { background: #FBE3E1; color: #C0392B; }
  .btn-danger:hover { background: #F8D2CF; }
  .btn-amber { background: var(--orange); color: var(--white); box-shadow: 0 6px 16px rgba(237,73,35,0.3); }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }

  .form-msg {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  .form-msg svg { width: 15px; height: 15px; }
  .form-msg.success { color: var(--green); }
  .form-msg.error { color: #C0392B; }

  .table-wrap { overflow-x: auto; margin-top: 16px; border-radius: 12px; border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { padding: 10px 12px; text-align: start; white-space: nowrap; }
  th {
    background: var(--purple);
    color: var(--white);
    font-family: 'Cairo', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 12px;
  }
  tbody tr:nth-child(even) { background: var(--cream); }
  tbody tr:hover { background: var(--orange-light); }
  td .status { font-size: 11px; padding: 4px 10px; }
  .table-actions { display: flex; gap: 6px; }

  .link-result {
    display: none;
    margin-top: 16px;
    background: var(--cream);
    border: 1px dashed var(--orange);
    border-radius: 12px;
    padding: 14px;
  }
  .link-result.show { display: block; }
  .link-result-title {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; color: var(--purple);
    margin-bottom: 8px;
  }
  .link-result-title svg { width: 15px; height: 15px; color: var(--orange); }
  .link-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .link-box code {
    flex: 1;
    font-size: 12px;
    color: var(--purple-light);
    word-break: break-all;
    direction: ltr;
    text-align: left;
  }
  .copy-btn {
    background: var(--purple);
    color: var(--white);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    display: flex; align-items: center;
    flex-shrink: 0;
  }
  .copy-btn svg { width: 14px; height: 14px; }

  .footer-credit {
    text-align: center;
    margin-top: 30px;
    font-size: 11px;
    color: var(--slate);
  }

  @media (max-width: 480px) {
    .hero h1 { font-size: 19px; }
    .field-row { flex-direction: column; }
    .order-header { flex-wrap: wrap; gap: 8px; }
    .logo-wrap img { max-width: 150px; }
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="lang-switch">
      <button id="btnAr" class="active" onclick="setLang('ar')">AR</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
    <div class="logo-wrap">
      <img src="logo.png" alt="Nasaq AlTahaddi Printing Company">
    </div>
    <h1 data-i18n="title">تتبع الطلبات</h1>
    <p data-i18n="subtitle">تابع حالة طلباتك وتاريخ التسليم المتوقع بكل سهولة</p>
  </div>

  <div class="container">

    <div id="customer-section">
      <div class="greeting-card" id="greeting-card">
        <div class="greeting-avatar"><i data-lucide="user-round"></i></div>
        <div>
          <h2 id="customer-name"></h2>
          <span id="orders-count"></span>
        </div>
      </div>

      <div class="section-label" id="orders-section-label" style="display:none;">
        <i data-lucide="boxes"></i> <span data-i18n="yourOrders">طلباتك</span>
      </div>

      <div id="orders-list"></div>
    </div>

    <div class="admin-toggle">
      <button onclick="toggleAdmin()">
        <i data-lucide="settings"></i> <span data-i18n="adminPanel">لوحة التحكم (للإدارة)</span>
      </button>
    </div>

    <div id="admin-section" class="admin-section">

      <div class="panel">
        <div class="panel-title">
          <div class="ic"><i data-lucide="plus-circle"></i></div>
          <span id="form-title" data-i18n="addOrder">إضافة طلب جديد</span>
        </div>
        <input type="hidden" id="rowIndex" value="">

        <div class="field-row">
          <div class="field">
            <label><i data-lucide="hash"></i> <span data-i18n="customerCode">كود العميل</span></label>
            <div style="display:flex; gap:8px;">
              <input type="text" id="customerCode" data-i18n-ph="codePlaceholder" placeholder="مثال: C001" style="flex:1;">
              <button class="btn btn-secondary btn-sm" type="button" onclick="generateCode()" style="white-space:nowrap;">
                <i data-lucide="sparkles"></i> <span data-i18n="generate">توليد كود</span>
              </button>
            </div>
          </div>
          <div class="field">
            <label><i data-lucide="user"></i> <span data-i18n="customerName">اسم العميل</span></label>
            <input type="text" id="customerNameInput" data-i18n-ph="namePlaceholder" placeholder="مثال: أحمد محمد">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label><i data-lucide="package"></i> <span data-i18n="orderId">رقم الطلب</span></label>
            <input type="text" id="orderId" data-i18n-ph="orderPlaceholder" placeholder="مثال: ORD-1001">
          </div>
          <div class="field">
            <label><i data-lucide="calendar-clock"></i> <span data-i18n="expectedDate">تاريخ التسليم المتوقع</span></label>
            <input type="date" id="expectedDeliveryDate">
          </div>
        </div>

        <div class="field">
          <label><i data-lucide="activity"></i> <span data-i18n="status">الحالة</span></label>
          <select id="status">
            <option value="قيد التجهيز" data-i18n="statusProcessing">⏳ قيد التجهيز</option>
            <option value="تم التسليم" data-i18n="statusDelivered">✅ تم التسليم</option>
          </select>
        </div>

        <div class="field">
          <label><i data-lucide="message-square"></i> <span data-i18n="notes">ملاحظات</span></label>
          <textarea id="notes" rows="2" data-i18n-ph="notesPlaceholder" placeholder="اختياري"></textarea>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveOrder()"><i data-lucide="save"></i> <span data-i18n="save">حفظ الطلب</span></button>
          <button class="btn btn-secondary" onclick="resetForm()"><i data-lucide="rotate-ccw"></i> <span data-i18n="newOrder">طلب جديد</span></button>
        </div>
        <div id="form-msg" class="form-msg"></div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <div class="ic"><i data-lucide="search"></i></div>
          <span data-i18n="searchTitle">بحث عن طلبات عميل</span>
        </div>

        <div class="field-row">
          <div class="field" style="flex:2;">
            <label><i data-lucide="hash"></i> <span data-i18n="customerCode">كود العميل</span></label>
            <input type="text" id="searchCode" data-i18n-ph="codePlaceholder" placeholder="مثال: C001">
          </div>
          <div class="field" style="flex:1; align-self:flex-end;">
            <button class="btn btn-amber" style="width:100%; justify-content:center;" onclick="searchOrders()">
              <i data-lucide="search"></i> <span data-i18n="search">بحث</span>
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table id="orders-table" style="display:none;">
            <thead>
              <tr>
                <th data-i18n="orderId">رقم الطلب</th>
                <th data-i18n="status">الحالة</th>
                <th data-i18n="expectedDate">تاريخ التسليم</th>
                <th data-i18n="notes">ملاحظات</th>
                <th data-i18n="actions">إجراءات</th>
              </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
          </table>
        </div>

        <div class="link-result" id="link-result">
          <div class="link-result-title"><i data-lucide="link"></i> <span data-i18n="linkLabel">رابط العميل (شاركه معه)</span></div>
          <div class="link-box">
            <code id="link-box"></code>
            <button class="copy-btn" onclick="copyLink()"><i data-lucide="copy"></i></button>
          </div>
        </div>
      </div>

    </div>

    <div class="footer-credit">Nasaq AlTahaddi Printing Company</div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwfUFrU4R6EdMM9OWZWOl2t81YoeWPs-PiY4ZLj7fihu_HzNssAPFtQ0DnxmpHfvI_q_A/exec";

  // ============ ترجمة ============
  const translations = {
    ar: {
      title: "تتبع الطلبات",
      subtitle: "تابع حالة طلباتك وتاريخ التسليم المتوقع بكل سهولة",
      yourOrders: "طلباتك",
      adminPanel: "لوحة التحكم (للإدارة)",
      addOrder: "إضافة طلب جديد",
      editOrder: "تعديل الطلب",
      customerCode: "كود العميل",
      customerName: "اسم العميل",
      orderId: "رقم الطلب",
      expectedDate: "تاريخ التسليم المتوقع",
      status: "الحالة",
      statusProcessing: "⏳ قيد التجهيز",
      statusDelivered: "✅ تم التسليم",
      notes: "ملاحظات",
      save: "حفظ الطلب",
      newOrder: "طلب جديد",
      searchTitle: "بحث عن طلبات عميل",
      search: "بحث",
      actions: "إجراءات",
      linkLabel: "رابط العميل (شاركه معه)",
      generate: "توليد كود",
      codePlaceholder: "مثال: C001",
      namePlaceholder: "مثال: أحمد محمد",
      orderPlaceholder: "مثال: ORD-1001",
      notesPlaceholder: "اختياري",
      greetingHello: "أهلاً",
      ordersCountSuffix: (n) => n === 1 ? "لديك طلب واحد" : `لديك ${n} طلبات`,
      noLinkTitle: "لا يوجد رابط محدد",
      noLinkBody: "افتح هذه الصفحة عبر الرابط الخاص بك الذي أرسلته لك الإدارة، وهو يحتوي على كود عميل مميز.",
      loadingTitle: "جاري تحميل طلباتك...",
      loadingBody: "برجاء الانتظار قليلاً",
      errorTitle: "حدث خطأ",
      errorBody: "تعذر تحميل البيانات",
      noOrdersTitle: "لا توجد طلبات بعد",
      noOrdersBody: "لم يتم تسجيل أي طلبات لهذا الحساب حتى الآن.",
      connectionErrorTitle: "تعذر الاتصال بالخادم",
      connectionErrorBody: "تأكد من إعداد رابط الـ API بشكل صحيح في الصفحة.",
      stepOrdered: "تم الطلب",
      stepProcessing: "قيد التجهيز",
      stepDelivered: "تم التسليم",
      expectedDeliveryLabel: "تاريخ التسليم المتوقع",
      saving: "جاري الحفظ...",
      noOrdersForCode: "لا توجد طلبات لهذا الكود",
      connectionError: "تعذر الاتصال بالخادم.",
      confirmDelete: "هل أنت متأكد من حذف هذا الطلب؟",
      apiErrorMsg: "تعذر الاتصال بالخادم. تأكد من رابط الـ API.",
      statusMap: { "قيد التجهيز": "⏳ قيد التجهيز", "تم التسليم": "✅ تم التسليم" }
    },
    en: {
      title: "Order Tracking",
      subtitle: "Track your order status and expected delivery date easily",
      yourOrders: "Your Orders",
      adminPanel: "Admin Panel",
      addOrder: "Add New Order",
      editOrder: "Edit Order",
      customerCode: "Customer Code",
      customerName: "Customer Name",
      orderId: "Order ID",
      expectedDate: "Expected Delivery Date",
      status: "Status",
      statusProcessing: "⏳ Processing",
      statusDelivered: "✅ Delivered",
      notes: "Notes",
      save: "Save Order",
      newOrder: "New Order",
      searchTitle: "Search Customer Orders",
      search: "Search",
      actions: "Actions",
      linkLabel: "Customer Link (share with them)",
      generate: "Generate Code",
      codePlaceholder: "e.g. C001",
      namePlaceholder: "e.g. John Smith",
      orderPlaceholder: "e.g. ORD-1001",
      notesPlaceholder: "Optional",
      greetingHello: "Hello",
      ordersCountSuffix: (n) => n === 1 ? "You have 1 order" : `You have ${n} orders`,
      noLinkTitle: "No Link Provided",
      noLinkBody: "Open this page via your unique link sent by the admin, which contains your customer code.",
      loadingTitle: "Loading your orders...",
      loadingBody: "Please wait a moment",
      errorTitle: "An Error Occurred",
      errorBody: "Failed to load data",
      noOrdersTitle: "No Orders Yet",
      noOrdersBody: "No orders have been registered for this account yet.",
      connectionErrorTitle: "Connection Failed",
      connectionErrorBody: "Please check the API URL configuration in this page.",
      stepOrdered: "Ordered",
      stepProcessing: "Processing",
      stepDelivered: "Delivered",
      expectedDeliveryLabel: "Expected delivery date",
      saving: "Saving...",
      noOrdersForCode: "No orders found for this code",
      connectionError: "Connection failed.",
      confirmDelete: "Are you sure you want to delete this order?",
      apiErrorMsg: "Connection failed. Check the API URL.",
      statusMap: { "قيد التجهيز": "⏳ Processing", "تم التسليم": "✅ Delivered" }
    }
  };

  let currentLang = localStorage.getItem("lang") || "ar";

  function t(key) {
    return translations[currentLang][key];
  }

  function applyTranslations() {
    document.getElementById("htmlRoot").lang = currentLang;
    document.getElementById("htmlRoot").dir = currentLang === "ar" ? "rtl" : "ltr";
    document.getElementById("btnAr").classList.toggle("active", currentLang === "ar");
    document.getElementById("btnEn").classList.toggle("active", currentLang === "en");
    document.getElementById("pageTitle").textContent =
      currentLang === "ar" ? "تتبع الطلبات | نسق التحدي" : "Order Tracking | Nasaq AlTahaddi";

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (translations[currentLang][key]) el.textContent = translations[currentLang][key];
    });
    document.querySelectorAll("[data-i18n-ph]").forEach(el => {
      const key = el.getAttribute("data-i18n-ph");
      if (translations[currentLang][key]) el.placeholder = translations[currentLang][key];
    });
  }

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem("lang", lang);
    applyTranslations();
    icons();
    // إعادة تحميل المحتوى الديناميكي
    loadCustomerOrders();
    const searchCode = document.getElementById("searchCode").value.trim();
    if (searchCode) searchOrders();
  }

  function icons() { lucide.createIcons(); }

  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function isDelivered(status) {
    return status === "تم التسليم";
  }

  function displayStatus(status) {
    return t("statusMap")[status] || status;
  }

  function progressTrack(status) {
    const delivered = isDelivered(status);
    return `
      <div class="progress-track">
        <div class="progress-step done">
          <div class="progress-line"></div>
          <div class="dot"><i data-lucide="check"></i></div>
          <div class="label">${t("stepOrdered")}</div>
        </div>
        <div class="progress-step ${delivered ? 'done' : 'active'}">
          <div class="progress-line"></div>
          <div class="dot"><i data-lucide="${delivered ? 'check' : 'loader'}"></i></div>
          <div class="label">${t("stepProcessing")}</div>
        </div>
        <div class="progress-step ${delivered ? 'done' : ''}">
          <div class="progress-line"></div>
          <div class="dot"><i data-lucide="${delivered ? 'check' : 'truck'}"></i></div>
          <div class="label">${t("stepDelivered")}</div>
        </div>
      </div>
    `;
  }

  async function loadCustomerOrders() {
    const code = getQueryParam("code");
    const ordersList = document.getElementById("orders-list");

    if (!code) {
      ordersList.innerHTML = `
        <div class="state-card">
          <div class="state-icon"><i data-lucide="link-2-off"></i></div>
          <h3>${t("noLinkTitle")}</h3>
          <p>${t("noLinkBody")}</p>
        </div>`;
      icons();
      return;
    }

    ordersList.innerHTML = `
      <div class="state-card spin">
        <div class="state-icon"><i data-lucide="loader-circle"></i></div>
        <h3>${t("loadingTitle")}</h3>
        <p>${t("loadingBody")}</p>
      </div>`;
    icons();

    try {
      const res = await fetch(`${API_URL}?action=getOrders&code=${encodeURIComponent(code)}`);
      const data = await res.json();

      if (!data.success) {
        ordersList.innerHTML = `
          <div class="state-card error">
            <div class="state-icon"><i data-lucide="alert-triangle"></i></div>
            <h3>${t("errorTitle")}</h3>
            <p>${data.message || t("errorBody")}</p>
          </div>`;
        icons();
        return;
      }

      if (data.orders.length === 0) {
        ordersList.innerHTML = `
          <div class="state-card">
            <div class="state-icon"><i data-lucide="package-open"></i></div>
            <h3>${t("noOrdersTitle")}</h3>
            <p>${t("noOrdersBody")}</p>
          </div>`;
        icons();
        return;
      }

      const greeting = document.getElementById("greeting-card");
      document.getElementById("customer-name").textContent = `${t("greetingHello")}, ${data.customerName}`;
      document.getElementById("orders-count").textContent = t("ordersCountSuffix")(data.orders.length);
      greeting.classList.add("show");
      document.getElementById("orders-section-label").style.display = "flex";

      ordersList.innerHTML = data.orders.map(order => {
        const delivered = isDelivered(order.status);
        return `
        <div class="order-card ${delivered ? 'delivered' : ''}">
          <div class="order-header">
            <div class="order-id-wrap">
              <div class="order-id-icon"><i data-lucide="${delivered ? 'package-check' : 'package'}"></i></div>
              <div>
                <div class="order-id">#${order.orderId}</div>
                <div class="order-sub">${order.customerName}</div>
              </div>
            </div>
            <div class="status ${delivered ? 'delivered' : ''}">
              <i data-lucide="${delivered ? 'check-circle-2' : 'clock'}"></i>
              ${displayStatus(order.status)}
            </div>
          </div>

          ${progressTrack(order.status)}

          ${order.expectedDeliveryDate ? `
          <div class="detail-row">
            <i data-lucide="calendar-clock"></i>
            <span><b>${t("expectedDeliveryLabel")}:</b> ${order.expectedDeliveryDate}</span>
          </div>` : ''}

          ${order.notes ? `
          <div class="detail-row">
            <i data-lucide="message-square-text"></i>
            <span>${order.notes}</span>
          </div>` : ''}
        </div>
        `;
      }).join("");
      icons();

    } catch (err) {
      ordersList.innerHTML = `
        <div class="state-card error">
          <div class="state-icon"><i data-lucide="wifi-off"></i></div>
          <h3>${t("connectionErrorTitle")}</h3>
          <p>${t("connectionErrorBody")}</p>
        </div>`;
      icons();
    }
  }

  function generateCode() {
    const rand = Math.floor(100 + Math.random() * 900);
    const yearShort = new Date().getFullYear().toString().slice(-2);
    const code = `C${yearShort}-${rand}`;
    document.getElementById("customerCode").value = code;
  }

  function toggleAdmin() {
    document.getElementById("admin-section").classList.toggle("show");
  }

  function resetForm() {
    document.getElementById("rowIndex").value = "";
    document.getElementById("customerCode").value = "";
    document.getElementById("customerNameInput").value = "";
    document.getElementById("orderId").value = "";
    document.getElementById("status").value = "قيد التجهيز";
    document.getElementById("expectedDeliveryDate").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("form-title").textContent = t("addOrder");
    document.getElementById("form-msg").innerHTML = "";
  }

  async function saveOrder() {
    const rowIndex = document.getElementById("rowIndex").value;
    const payload = {
      action: rowIndex ? "updateOrder" : "addOrder",
      rowIndex: rowIndex ? parseInt(rowIndex) : undefined,
      customerCode: document.getElementById("customerCode").value.trim(),
      customerName: document.getElementById("customerNameInput").value.trim(),
      orderId: document.getElementById("orderId").value.trim(),
      status: document.getElementById("status").value,
      expectedDeliveryDate: document.getElementById("expectedDeliveryDate").value,
      notes: document.getElementById("notes").value.trim()
    };

    const msgEl = document.getElementById("form-msg");
    msgEl.innerHTML = `<i data-lucide="loader-circle" class="spin"></i> ${t("saving")}`;
    msgEl.className = "form-msg";
    icons();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      msgEl.innerHTML = `<i data-lucide="${data.success ? 'check-circle-2' : 'x-circle'}"></i> ${data.message}`;
      msgEl.className = data.success ? "form-msg success" : "form-msg error";
      icons();

      if (data.success) {
        resetForm();
        if (payload.customerCode) showCustomerLink(payload.customerCode);
        const searchCode = document.getElementById("searchCode").value.trim();
        if (searchCode) searchOrders();
      }
    } catch (err) {
      msgEl.innerHTML = `<i data-lucide="wifi-off"></i> ${t("apiErrorMsg")}`;
      msgEl.className = "form-msg error";
      icons();
    }
  }

  function showCustomerLink(code) {
    const baseUrl = window.location.href.split("?")[0];
    const link = `${baseUrl}?code=${encodeURIComponent(code)}`;
    document.getElementById("link-box").textContent = link;
    document.getElementById("link-result").classList.add("show");
  }

  function copyLink() {
    const text = document.getElementById("link-box").textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector(".copy-btn");
      btn.innerHTML = `<i data-lucide="check"></i>`;
      icons();
      setTimeout(() => { btn.innerHTML = `<i data-lucide="copy"></i>`; icons(); }, 1500);
    });
  }

  async function searchOrders() {
    const code = document.getElementById("searchCode").value.trim();
    if (!code) return;

    try {
      const res = await fetch(`${API_URL}?action=getOrders&code=${encodeURIComponent(code)}`);
      const data = await res.json();

      const table = document.getElementById("orders-table");
      const tbody = document.getElementById("orders-table-body");

      if (!data.success || data.orders.length === 0) {
        table.style.display = "none";
        alert(t("noOrdersForCode"));
        return;
      }

      tbody.innerHTML = data.orders.map(o => {
        const delivered = isDelivered(o.status);
        return `
        <tr>
          <td><b>${o.orderId}</b></td>
          <td>
            <span class="status ${delivered ? 'delivered' : ''}">
              <i data-lucide="${delivered ? 'check-circle-2' : 'clock'}"></i> ${displayStatus(o.status)}
            </span>
          </td>
          <td>${o.expectedDeliveryDate || "—"}</td>
          <td>${o.notes || "—"}</td>
          <td>
            <div class="table-actions">
              <button class="btn btn-secondary btn-sm" onclick='editOrder(${JSON.stringify(o)})'><i data-lucide="pencil"></i></button>
              <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.rowIndex})"><i data-lucide="trash-2"></i></button>
            </div>
          </td>
        </tr>`;
      }).join("");

      table.style.display = "table";
      icons();
      showCustomerLink(code);

    } catch (err) {
      alert(t("connectionError"));
    }
  }

  function editOrder(order) {
    document.getElementById("rowIndex").value = order.rowIndex;
    document.getElementById("customerCode").value = order.customerCode;
    document.getElementById("customerNameInput").value = order.customerName;
    document.getElementById("orderId").value = order.orderId;
    document.getElementById("status").value = order.status;
    document.getElementById("expectedDeliveryDate").value = order.expectedDeliveryDate;
    document.getElementById("notes").value = order.notes;
    document.getElementById("form-title").textContent = t("editOrder");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function deleteOrder(rowIndex) {
    if (!confirm(t("confirmDelete"))) return;

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "deleteOrder", rowIndex })
      });
      const data = await res.json();
      if (data.success) {
        searchOrders();
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert(t("connectionError"));
    }
  }

  applyTranslations();
  icons();
  loadCustomerOrders();
</script>
</body>
</html>
